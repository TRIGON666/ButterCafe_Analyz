<form id="orderForm">
    <div class="order-modal-scroll">
        <h2 class="order-modal-title">Ваш заказ</h2>
        <div class="order-modal-list">
            {% for item in cart_items %}
            <div class="order-modal-item">
                <div class="order-modal-img-block">
                    {% if item.product.image %}
                    <img src="{{ item.product.image.url }}" alt="{{ item.product.name }}" class="order-modal-img">
                    {% endif %}
                </div>
                <div class="order-modal-info">
                    <div class="order-modal-name">{{ item.product.name }}</div>
                    <div class="order-modal-qty">× {{ item.quantity }}</div>
                    <div class="order-modal-price">{{ item.total_price|floatformat:0 }} р.</div>
                </div>
            </div>
            {% endfor %}
        </div>
        <div class="order-modal-fields">
            <label>Имя:<input type="text" name="name" value="{{ initial_name }}" required></label>
            <label>Телефон:<input type="text" name="phone" value="{{ initial_phone }}" required></label>
            <label>Email:<input type="email" name="email" value="{{ initial_email }}"></label>
            <label>Способ получения:
                <select name="delivery_type" id="deliveryType" required>
                    <option value="pickup_10a">Самовывоз с Лобачевского 10а</option>
                    <option value="pickup_43">Самовывоз с Щапова 43</option>
                    <option value="pickup_51">Самовывоз с Сибгата Хакима 51 (ЖК Столичный)</option>
                    <option value="pickup_20a">Самовывоз с Чистопольской 20а</option>
                    <option value="delivery">Доставка</option>
                </select>
            </label>
            <label id="addressBlock">Адрес доставки:<input type="text" name="address" id="deliveryAddress" value="{{ initial_address }}"></label>
            <label>Комментарий:<textarea name="comment"></textarea></label>
            <label>Время к заказу:<input type="text" name="time"></label>
            <label><input type="checkbox" name="need_cutlery" checked> Одноразовые приборы</label>
            <label><input type="checkbox" name="need_call" checked> Позвонить для подтверждения</label>
        </div>
    </div>
    <div class="order-modal-summary-fixed">
        <div class="order-modal-row"><span>Стоимость товаров:</span> <b><span id="orderItemsPrice" data-value="{{ items_price|floatformat:0 }}">{{ items_price|floatformat:0 }}</span> р.</b></div>
        <div class="order-modal-row"><span>Доставка:</span> <b><span id="orderDeliveryPrice">0</span> р.</b></div>
        <div class="order-modal-row order-modal-total"><span>Итого:</span> <b><span id="orderTotalPrice">{{ items_price|floatformat:0 }}</span> р.</b></div>
        <button type="submit" class="order-btn order-modal-submit">Оформить заказ</button>
    </div>
    <button type="button" class="modal-order-close" id="modalOrderClose"><i class="fa-solid fa-xmark"></i></button>
</form>
