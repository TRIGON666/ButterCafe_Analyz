services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-buttercafe}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - ./docker_data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-buttercafe}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DEBUG: ${DEBUG:-False}
      SECRET_KEY: ${SECRET_KEY:-change-this-secret-key-before-deploy}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-}
      DB_NAME: ${DB_NAME:-buttercafe}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_HOST: db
      DB_PORT: 5432
      ANALYTICS_EXPORT_ROOT: /app/private_data_lake
      EMAIL_BACKEND: ${EMAIL_BACKEND:-django.core.mail.backends.console.EmailBackend}
      EMAIL_HOST: ${EMAIL_HOST:-}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS:-True}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-report@buttercafe.local}
      OWNER_REPORT_EMAIL: ${OWNER_REPORT_EMAIL:-}
      SECURE_SSL_REDIRECT: ${SECURE_SSL_REDIRECT:-False}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-False}
      CSRF_COOKIE_SECURE: ${CSRF_COOKIE_SECURE:-False}
      SECURE_HSTS_SECONDS: ${SECURE_HSTS_SECONDS:-0}
      WHITENOISE_USE_FINDERS: ${WHITENOISE_USE_FINDERS:-True}
      SERVE_MEDIA_FILES: ${SERVE_MEDIA_FILES:-True}
      METABASE_URL: ${METABASE_URL:-http://localhost:3000}
      METABASE_DASHBOARD_ID: ${METABASE_DASHBOARD_ID:-}
      METABASE_EMBED_SECRET: ${METABASE_EMBED_SECRET:-}
      METABASE_EMBED_THEME: ${METABASE_EMBED_THEME:-light}
      METABASE_USERNAME: ${METABASE_USERNAME:-}
      METABASE_PASSWORD: ${METABASE_PASSWORD:-}
      METABASE_REVENUE_CARD_ID: ${METABASE_REVENUE_CARD_ID:-}
      METABASE_ORDERS_CARD_ID: ${METABASE_ORDERS_CARD_ID:-}
      METABASE_AVG_CHECK_CARD_ID: ${METABASE_AVG_CHECK_CARD_ID:-}
      METABASE_NEW_CLIENTS_CARD_ID: ${METABASE_NEW_CLIENTS_CARD_ID:-}
      METABASE_TOP_PRODUCTS_CARD_ID: ${METABASE_TOP_PRODUCTS_CARD_ID:-}
    volumes:
      - ./media:/app/media
      - ./private_data_lake:/app/private_data_lake
    ports:
      - "${WEB_PORT:-8000}:8000"

  metabase-db-init:
    image: postgres:16-alpine
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_USER: ${DB_USER:-postgres}
      PGPASSWORD: ${DB_PASSWORD:-postgres}
      METABASE_DB_NAME: ${METABASE_DB_NAME:-metabase}
    command: >
      sh -c 'createdb -h db -U "$$DB_USER" "$$METABASE_DB_NAME" 2>/dev/null || true;
      echo "Metabase database is ready: $$METABASE_DB_NAME"'

  metabase:
    image: metabase/metabase:latest
    restart: unless-stopped
    depends_on:
      metabase-db-init:
        condition: service_completed_successfully
    environment:
      MB_DB_TYPE: postgres
      MB_DB_HOST: db
      MB_DB_PORT: 5432
      MB_DB_DBNAME: ${METABASE_DB_NAME:-metabase}
      MB_DB_USER: ${DB_USER:-postgres}
      MB_DB_PASS: ${DB_PASSWORD:-postgres}
    ports:
      - "${METABASE_PORT:-3000}:3000"
